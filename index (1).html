// ── QUESTION: MULTIPLE CHOICE ─────────────────────────────

function QMC({q,opts,ok,tip,onAnswer,nextLabel}){
  const [sel,setSel]=useState(null);
  const [shake,setShake]=useState(false);
  const pick=i=>{
    if(sel!==null)return;
    setSel(i);
    if(i!==ok){setShake(true);setTimeout(()=>setShake(false),380);}
  };
  const stl=i=>{
    const b={display:'block',width:'100%',textAlign:'left',padding:'13px 16px',borderRadius:10,marginBottom:8,
      fontFamily:"'Jost',sans-serif",fontSize:14,lineHeight:1.5,outline:'none',
      transition:'all 0.14s',border:'1px solid',cursor:sel===null?'pointer':'default'};
    if(sel===null)return{...b,background:'#1a1710',borderColor:'#2a2418',color:'#d4cfc6'};
    if(i===ok)return{...b,background:'rgba(200,136,42,0.14)',borderColor:'#C8882A',color:'#E8C080'};
    if(i===sel)return{...b,background:'rgba(210,50,50,0.12)',borderColor:'#c23434',color:'#fca5a5'};
    return{...b,background:'#1a1710',borderColor:'#2a2418',color:'#d4cfc6',opacity:0.38};
  };
  return(
    <div className={shake?'sk':''}>
      <p style={{fontSize:16,fontWeight:500,color:'#f0ece4',lineHeight:1.5,marginBottom:20}}>{q}</p>
      {opts.map((o,i)=>(
        <button key={i} onClick={()=>pick(i)} style={stl(i)}>
          <span style={{fontSize:11,fontWeight:500,marginRight:10,
            color:sel===null?'#3d4a5c':i===ok?'#C8882A':i===sel?'#c23434':'#3d4a5c'}}>
            {String.fromCharCode(65+i)}
          </span>{o}
        </button>
      ))}
      {sel!==null&&<Feedback correct={sel===ok} tip={tip} label={sel!==ok?`A resposta certa: ${opts[ok]}`:null}/>}
      {sel!==null&&<NextBtn label={nextLabel} onClick={()=>onAnswer(sel===ok)}/>}
    </div>
  );
}

// ── QUESTION: MATCHING ────────────────────────────────────

function QMatch({pairs,tip,onAnswer,nextLabel}){
  const shuffledTrans=useMemo(()=>shuffleArr(pairs.map((p,i)=>({text:p[1],orig:i}))),[]);
  const [selE,setSelE]=useState(null);
  const [selT,setSelT]=useState(null);
  const [matched,setMatched]=useState(new Set());
  const [matchedT,setMatchedT]=useState(new Set());
  const [wrong,setWrong]=useState(null);
  const [done,setDone]=useState(false);
  const [newMatch,setNewMatch]=useState(null);

  useEffect(()=>{
    if(selE===null||selT===null)return;
    if(shuffledTrans[selT].orig===selE){
      const nm=new Set(matched);nm.add(selE);
      const nmt=new Set(matchedT);nmt.add(selT);
      setMatched(nm);setMatchedT(nmt);
      setNewMatch(selE);setTimeout(()=>setNewMatch(null),300);
      setSelE(null);setSelT(null);
      if(nm.size===pairs.length)setTimeout(()=>setDone(true),350);
    }else{
      setWrong({e:selE,t:selT});
      setTimeout(()=>{setWrong(null);setSelE(null);setSelT(null);},700);
    }
  },[selE,selT]);

  const es=i=>{
    if(matched.has(i))return'matched';
    if(wrong&&wrong.e===i)return'wrong';
    if(selE===i)return'sel';
    return'idle';
  };
  const ts=i=>{
    if(matchedT.has(i))return'matched';
    if(wrong&&wrong.t===i)return'wrong';
    if(selT===i)return'sel';
    return'idle';
  };
  const cs=st=>{
    const b={padding:'11px 10px',borderRadius:9,fontSize:13,fontWeight:500,
      fontFamily:"'Jost',sans-serif",outline:'none',transition:'all 0.16s',
      cursor:'pointer',textAlign:'center',border:'1px solid',lineHeight:1.3};
    if(st==='idle')return{...b,background:'#1a1710',borderColor:'#2a2418',color:'#d4cfc6'};
    if(st==='sel')return{...b,background:'rgba(200,136,42,0.15)',borderColor:'#C8882A',color:'#E8C080'};
    if(st==='matched')return{...b,background:'rgba(200,136,42,0.14)',borderColor:'#C8882A',color:'#E8C080',cursor:'default'};
    if(st==='wrong')return{...b,background:'rgba(210,50,50,0.14)',borderColor:'#c23434',color:'#fca5a5'};
    return b;
  };

  return(
    <div>
      <p style={{fontSize:11,fontWeight:500,letterSpacing:'0.08em',textTransform:'uppercase',color:'#8a7e6e',marginBottom:14}}>
        Conecte cada expressão à sua tradução
      </p>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
        {pairs.map((p,i)=>(
          <button key={i} className={newMatch===i?'mb':''}
            onClick={()=>{if(!matched.has(i))setSelE(selE===i?null:i);}}
            style={cs(es(i))}>{p[0]}</button>
        ))}
      </div>
      <div style={{borderTop:'1px dashed #1e293b',margin:'4px 0 10px'}}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        {shuffledTrans.map((t,i)=>(
          <button key={i}
            onClick={()=>{if(!matchedT.has(i))setSelT(selT===i?null:i);}}
            style={cs(ts(i))}>{t.text}</button>
        ))}
      </div>
      <p style={{fontSize:11,color:'#4a4030',textAlign:'center',marginTop:10}}>
        {matched.size}/{pairs.length} pares conectados
      </p>
      {done&&(
        <div className="fu">
          <Feedback correct={true} tip={tip}/>
          <NextBtn label={nextLabel} onClick={()=>onAnswer(true)}/>
        </div>
      )}
    </div>
  );
}

function QuizScreen({mod,onDone,onBack}){
  const [qIdx,setQIdx]=useState(0);
  const [score,setScore]=useState(0);
  const q=mod.quiz[qIdx];
  const isLast=qIdx===mod.quiz.length-1;
  const progress=(qIdx/mod.quiz.length)*100;

  const handle=correct=>{
    const ns=score+(correct?1:0);
    if(isLast){onDone(ns);}
    else{setScore(ns);setQIdx(i=>i+1);}
  };

  const renderQ=()=>{
    const key=`${mod.id}-${qIdx}`;
    const nl=isLast?'Ver resultado →':'Próxima →';
    switch(q.type){
      case'mc':return<QMC key={key} {...q} nextLabel={nl} onAnswer={handle}/>;
      case'translate':return<QTranslate key={key} {...q} nextLabel={nl} onAnswer={handle}/>;
      case'tf':return<QTF key={key} {...q} nextLabel={nl} onAnswer={handle}/>;
      case'match':return<QMatch key={key} {...q} nextLabel={nl} onAnswer={handle}/>;
    }
  };

  const typeLabel={mc:'Múltipla escolha',translate:'Tradução',tf:'Verdadeiro ou falso',match:'Conectar pares'};

  if(mod.closing) return(
    <div style={{maxWidth:520,margin:'0 auto',padding:'20px 20px 60px'}}> 
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button onClick={onBack} style={{background:'transparent',border:'none',color:'#5a5040',
          cursor:'pointer',fontFamily:"'Jost',sans-serif",fontSize:13,padding:0}}>← voltar</button>
        <p style={{fontSize:11,fontWeight:500,letterSpacing:'0.08em',textTransform:'uppercase',color:mod.color}}>
          {mod.badge} — {mod.title}
        </p>
      </div>
      <div style={{background:'#13110d',border:'1px solid #2a2418',borderRadius:14,overflow:'hidden'}}>
        <ClosingFlow onDone={()=>onDone(1)}/>
      </div>
    </div>
  );

  return(
    <div style={{maxWidth:520,margin:'0 auto',padding:'20px 20px 60px'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <button onClick={onBack} style={{background:'transparent',border:'none',color:'#5a5040',
          cursor:'pointer',fontFamily:"'Jost',sans-serif",fontSize:13,padding:0}}>
          ← voltar
        </button>
        <div style={{flex:1}}>
          <p style={{fontSize:11,fontWeight:500,letterSpacing:'0.08em',textTransform:'uppercase',color:mod.color}}>
            {mod.badge} — {mod.title}
          </p>
        </div>
        <p style={{fontSize:12,color:'#5a5040'}}>{qIdx+1}/{mod.quiz.length}</p>
      </div>
      <div style={{height:4,background:'#1a1710',borderRadius:4,overflow:'hidden',marginBottom:24}}>
        <div style={{height:'100%',background:mod.color,borderRadius:4,width:`${progress}%`,transition:'width 0.4s ease'}}/>
      </div>
      <div className="fu" key={qIdx} style={{
        background:'#13110d',border:`1px solid #1e293b`,borderRadius:14,padding:'24px 22px'
      }}>
        <p style={{fontSize:11,fontWeight:500,letterSpacing:'0.08em',textTransform:'uppercase',
          color:mod.color,marginBottom:14}}>{typeLabel[q.type]}</p>
        {renderQ()}
      </div>
    </div>
  );
}

function ResultScreen({mod,score,onBack,onNext,isLastMod}){
  const total=mod.quiz.length;
  const pct=Math.round(score/total*100);
  const stars=pct>=90?3:pct>=60?2:pct>=30?1:0;
  const unlockPdf=mod.pdf&&pct>=70;
  const msg=stars>=3?'Módulo dominado!':stars>=2?'Muito bom!':stars>=1?'Bom começo!':'Continue praticando';
  const sub=stars>=3?'Você absorveu tudo que esse módulo tinha a oferecer.':
    stars>=2?'Mais uma rodada vai consolidar o que ficou.':
    'Revise as aulas e tente novamente — vai ficar mais fácil.';

  return(
    <div style={{maxWidth:500,margin:'0 auto',padding:'40px 20px 60px',textAlign:'center'}}>
      <p style={{fontSize:11,fontWeight:500,letterSpacing:'0.1em',textTransform:'uppercase',color:mod.color,marginBottom:10}}>

      </p>
      <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:800,color:'#f0ece4',marginBottom:6}}>{msg}</h2>
      <p style={{fontSize:14,color:'#8a7e6e',marginBottom:28}}>{sub}</p>

      <div style={{display:'flex',justifyContent:'center',gap:12,marginBottom:24}}>
        {[0,1,2].map(i=>(
          <svg key={i} width="42" height="42" viewBox="0 0 40 40"
            className={i<stars?'pp':''} style={{animationDelay:`${i*0.13}s`}}>
            <polygon points="20,3 24,14 36,14 27,22 30,34 20,27 10,34 13,22 4,14 16,14"
              fill={i<stars?mod.color:'#231f16'} stroke="none"/>
          </svg>
        ))}
      </div>

      <div style={{display:'flex',justifyContent:'center',gap:44,marginBottom:32}}>
        {[{n:`${score}/${total}`,l:'acertos'},{n:`${pct}%`,l:'aproveitamento'}].map(({n,l},i)=>(
          <div key={i}>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:38,fontWeight:800,color:mod.color,lineHeight:1}}>{n}</p>
            <p style={{fontSize:12,color:'#5a5040',marginTop:2}}>{l}</p>

      {mod.pdf&&(
        <div style={{
          background:unlockPdf?'rgba(200,136,42,0.07)':'rgba(255,255,255,0.02)',
          border:`1px solid ${unlockPdf?'rgba(200,136,42,0.3)':'#1e2a3a'}`,
          borderRadius:12,padding:'18px 20px',marginBottom:20,textAlign:'left'

            color:unlockPdf?'#C8882A':'#3d4a5c',marginBottom:5}}>
            {unlockPdf?'Recompensa desbloqueada!':'Recompensa bloqueada'}
          </p>
          <p style={{fontSize:14,fontWeight:500,color:unlockPdf?'#e6edf3':'#3d4a5c',lineHeight:1.4,marginBottom:unlockPdf?10:4}}>
            {mod.pdfLabel}
          </p>
          {unlockPdf?(
            <a href="#" style={{display:'inline-flex',alignItems:'center',gap:6,
              padding:'9px 16px',background:'#C8882A',borderRadius:8,color:'#fff',
              fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:500,textDecoration:'none'}}>
              Baixar PDF →
            </a>
          ):(
            <p style={{fontSize:12,color:'#4a4030'}}>Acerte 70%+ para desbloquear o guia</p>
          )}
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <button onClick={onBack} style={{padding:'13px',borderRadius:10,border:'1px solid #2a2418',
          background:'transparent',color:'#8a7e6e',fontFamily:"'Jost',sans-serif",fontSize:14,cursor:'pointer'}}>

        <button onClick={onNext} style={{padding:'13px',borderRadius:10,
          border:`1px solid ${mod.color}`,background:mod.color,color:'#fff',
          fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:500,cursor:'pointer'}}>
          {isLastMod?'Ver placar final':'Próximo módulo →'}

  const stars=qPct===null?0:qPct>=90?3:qPct>=60?2:1;
  return(
    <div style={{background:'#0f0e0a',border:`1px solid ${open?mod.border:'#1e1c15'}`,
      borderRadius:14,marginBottom:12,overflow:'hidden',transition:'border-color 0.2s'}}>
      <div onClick={()=>setOpen(o=>!o)} style={{padding:'18px 20px',cursor:'pointer',display:'flex',alignItems:'center',gap:14}}>
        <div style={{width:38,height:38,borderRadius:10,flexShrink:0,
          background:allDone?mod.color:mod.bg,border:`1px solid ${mod.border}`,
          display:'flex',alignItems:'center',justifyContent:'center',transition:'background 0.3s'}}>
          {allDone
            ?<svg width="16" height="16" viewBox="0 0 16 16"><polyline points="2,8 6,12 14,4" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
            :<span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:13,fontWeight:700,color:mod.color}}>{mod.badge}</span>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <p style={{fontSize:10,fontWeight:500,letterSpacing:'0.08em',textTransform:'uppercase',color:mod.color,marginBottom:2}}>{mod.sub}</p>
          <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,color:'#f0ece4',lineHeight:1.2}}>{mod.title}</h3>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:5,flexShrink:0}}>
          {qPct!==null&&<div style={{display:'flex',gap:3}}>
            {[0,1,2].map(i=>(
              <svg key={i} width="11" height="11" viewBox="0 0 36 36">
                <polygon points="18,4 22,14 33,14 24,21 27,32 18,25 9,32 12,21 3,14 14,14" fill={i<stars?mod.color:'#231f16'}/>
              </svg>
            ))}
          </div>}
          <span style={{fontSize:18,color:'#3a3020',transition:'transform 0.2s',display:'block',transform:open?'rotate(90deg)':'rotate(0deg)'}}>›</span>
        </div>
      </div>
      {open&&(
        <div className="fu" style={{borderTop:'1px solid #1a1710',padding:'4px 20px 6px'}}>
          {todos.map((item,i)=>(
            <TodoItem key={i} item={item} done={!!checked[i]} color={mod.color} onToggle={()=>onToggle(mod.id,i)}/>
          ))}
          <div style={{margin:'16px 0 8px',background:'rgba(200,136,42,0.05)',
            border:'1px solid rgba(200,136,42,0.15)',borderRadius:10,padding:'14px 16px'}}>
            <p style={{fontSize:10,fontWeight:600,letterSpacing:'0.09em',textTransform:'uppercase',color:'#C8882A',marginBottom:6}}>Tarefa de casa</p>
            <p style={{fontSize:13.5,color:'#a89880',lineHeight:1.6}}>{HOMEWORK[mod.id]}</p>
          </div>
          <div style={{paddingBottom:16,paddingTop:4}}>
            <button onClick={onStartQuiz} style={{display:'flex',alignItems:'center',justifyContent:'space-between',
              width:'100%',padding:'12px 16px',borderRadius:10,
              background:qPct!==null?'transparent':mod.bg,border:`1px solid ${mod.border}`,
              cursor:'pointer',fontFamily:"'Jost',sans-serif"}}>
              <div style={{textAlign:'left'}}>
                <p style={{fontSize:13,fontWeight:500,color:mod.color}}>{qPct!==null?'Refazer quiz':'Fazer quiz do módulo →'}</p>
                {qPct!==null&&<p style={{fontSize:11,color:'#5a5040',marginTop:1}}>{quizResult}/{mod.quiz.length} acertos · {qPct}% aproveitamento</p>}
              </div>
              <span style={{fontSize:16,color:mod.color}}>→</span>
            </button>
          </div>
        </div>
      )}
    </div>
  );
}
function PlannerScreen({results,checked,onToggle,onStartQuiz}){
  const totalItems=Object.values(TODOS).reduce((a,b)=>a+b.length,0);
  const totalDone=Object.entries(checked).reduce((a,[,v])=>a+Object.values(v).filter(Boolean).length,0);
  const progPct=totalItems?Math.round(totalDone/totalItems*100):0;
  return(
    <div style={{maxWidth:640,margin:'0 auto',padding:'28px 20px 60px'}}>
      <div style={{background:'#0f0e0a',border:'1px solid #1e1c15',borderRadius:18,padding:'28px 26px',marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'center',marginBottom:20}}>
          <img src={LOGO} alt="Inglês Sem Trava" style={{width:200,height:'auto',display:'block'}}/>
        </div>
        <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:600,
          color:'#8a7e6e',textAlign:'center',letterSpacing:'0.04em',marginBottom:14}}>Planner de Estudos</p>
      </div>
      <div style={{background:'rgba(200,136,42,0.05)',border:'1px solid rgba(200,136,42,0.18)',
        borderRadius:10,padding:'12px 16px',marginBottom:20}}>
        <p style={{fontSize:12,color:'#8a7e6e',lineHeight:1.6}}>
          <span style={{color:'#C8882A',fontWeight:500}}>Fluêncio</span> e <span style={{color:'#C8882A',fontWeight:500}}>Speak Aloud</span> são ferramentas exclusivas do <span style={{color:'#d4cfc6'}}>Acelerador de Conversação</span>.{' '}
          <a href="https://pay.hotmart.com/M104988462Y?off=oefp8073" style={{color:'#C8882A',textDecoration:'underline'}}>Adquirir acesso →</a>
        </p>
      </div>
      {MODS.map((mod,mi)=>{
        const isLocked=false;
        return(
        <ModuleCard key={mod.id} mod={mod} checked={checked[mod.id]||{}}
          onToggle={onToggle} onStartQuiz={()=>onStartQuiz(mi)} quizResult={results[mod.id]}
          isLocked={isLocked}/>
        );
      })}
    </div>
  );
}

// ── FINAL SCORE ───────────────────────────────────────────

function FinalScreen({results,onRestart}){
  const total=Object.values(results).reduce((a,b)=>a+b,0);
  const max=MODS.length*10;
  const pct=Math.round(total/max*100);
  return(
    <div style={{maxWidth:480,margin:'0 auto',padding:'40px 20px 60px',textAlign:'center'}}>
      <p style={{fontSize:11,fontWeight:500,letterSpacing:'0.1em',textTransform:'uppercase',color:'#C8882A',marginBottom:12}}>Resultado final</p>
      <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:52,fontWeight:800,color:'#C8882A',lineHeight:1}}>{pct}%</p>
      <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:'#f0ece4',marginTop:8,marginBottom:6}}>{total}/{max} pontos</p>
      <p style={{fontSize:14,color:'#8a7e6e',marginBottom:32}}>
        {pct>=80?'Excelente — você dominou o curso!':pct>=60?'Muito bom! Refaça os módulos mais fracos.':'Continue praticando — cada rodada consolida mais.'}
      </p>
      <div style={{marginBottom:28}}>
        {MODS.map(mod=>{
          const s=results[mod.id]||0;
          const p=Math.round(s/mod.quiz.length*100);
          const st=p>=90?3:p>=60?2:1;
          return(
            <div key={mod.id} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 0',
              borderBottom:'1px solid #231f16',textAlign:'left'}}>
              <div style={{width:30,height:30,borderRadius:8,background:mod.bg,border:`1px solid ${mod.border}`,
                display:'flex',alignItems:'center',justifyContent:'center',
                fontFamily:"'Cormorant Garamond',serif",fontSize:10,fontWeight:700,color:mod.color,flexShrink:0}}>
                {mod.badge}
              </div>
              <div style={{flex:1}}>
                <p style={{fontSize:13,fontWeight:500,color:'#f0ece4'}}>{mod.title}</p>
                <p style={{fontSize:11,color:'#5a5040'}}>{s}/{mod.quiz.length} acertos</p>
              </div>
              <div style={{display:'flex',gap:3}}>
                {[0,1,2].map(i=>(
                  <svg key={i} width="13" height="13" viewBox="0 0 36 36">
                    <polygon points="18,4 22,14 33,14 24,21 27,32 18,25 9,32 12,21 3,14 14,14"
                      fill={i<st?mod.color:'#231f16'}/>
                  </svg>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      <button onClick={onRestart} style={{width:'100%',padding:'14px',borderRadius:10,
        background:'#C8882A',border:'none',color:'#fff',
        fontFamily:"'Jost',sans-serif",fontSize:15,fontWeight:500,cursor:'pointer'}}>
        Jogar novamente
      </button>
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────

function App(){
  const [view,setView]=useState('planner');
  const [curMod,setCurMod]=useState(0);
  const [results,setResults]=useState({});
  const [checked,setChecked]=useState({});

  const toggleCheck=(modId,idx)=>{
    setChecked(prev=>{const mc={...(prev[modId]||{})};mc[idx]=!mc[idx];return {...prev,[modId]:mc};});
  };

  const go=to=>{setView(to);window.scrollTo(0,0);};

  const startQuiz=mi=>{setCurMod(mi);go('quiz');};
  const doneQuiz=score=>{setResults(p=>({...p,[MODS[curMod].id]:score}));go('result');};
  const goNext=()=>curMod<MODS.length-1?startQuiz(curMod+1):go('final');

  return(
    <div>
      {view==='planner'&&<PlannerScreen results={results} checked={checked} onToggle={toggleCheck} onStartQuiz={startQuiz}/>}
      {view==='quiz'&&<QuizScreen mod={MODS[curMod]} onDone={doneQuiz} onBack={()=>go('planner')}/>}
      {view==='result'&&(
        <ResultScreen mod={MODS[curMod]} score={results[MODS[curMod].id]}
          onBack={()=>go('planner')} onNext={goNext}
          isLastMod={curMod===MODS.length-1}/>
      )}
      {view==='final'&&<FinalScreen results={results} onRestart={()=>{setResults({});go('planner');}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
